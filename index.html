<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive CPU Scheduling Simulator - Visualize and understand different scheduling algorithms"
    />
    <!-- ================ TITLE ================= -->
    <title>CPU Scheduling Simulator</title>

    <!-- ================= GOOGLE FONTS ================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- ================= EXTERNAL STYLESHEET =================  -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/variables.css" />

    <!-- ================= FONT AWESOME ICONS ================= -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- ================= HOMEPAGE ================= -->
    <main id="homepage" class="page active" role="main">
      <div class="container">
        <!-- ================= HEADING ================= -->
        <header class="hero">
          <h1 class="hero-title">CPU Scheduling Simulator</h1>
          <p class="hero-subtitle">
            Explore and visualise different CPU scheduling algorithms with
            interactive simulations
          </p>
        </header>

        <!-- ================= ALGORITHM CARDS ================= -->
        <section class="algorithms" aria-label="SchedulingAlgorithms">
          <div class="algorithm-grid" id="algorithmGrid">
            <!-- ================= CARDS WILL BE GENERATED FROM ALGORITHMS.JS -->
          </div>
        </section>

        <!-- ================= CTA ================= -->
        <div class="cta-section">
          <button
            class="btn btn-primary btn-large"
            id="simulatorBtn"
            aria-label="Launch Interactive Simulator"
          >
            Launch Simulator <i class="fa-solid fa-play"></i>
          </button>
        </div>
      </div>
 
    </main>

    <!-- ================= MODAL ================= -->
    <aside
      id="algorithmModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      hidden
    >
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-content">
        <header class="modal-header">
          <h2 id="modalTitle" class="modal-title"></h2>
          <button class="modal-close" id="modalClose" aria-label="Close Modal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </header>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </aside>


  </body>


  <!-- Scripts -->
    <script src="js/config/algorithms.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/core/scheduler.js"></script>
    <script src="js/ui/render.js"></script>
    <script src="js/ui/modal.js"></script>
    <script src="js/ui/simulator.js"></script>
    <script src="js/main.js"></script>
</html>
